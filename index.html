<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoiceScribe</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: #252b35;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --accent-glow: rgba(0, 229, 160, 0.35);
      --text: #e8ecf0;
      --text-muted: #6b7585;
      --red: #ff4d6d;
      --red-dim: rgba(255, 77, 109, 0.12);
      --yellow: #ffd166;
      --yellow-dim: rgba(255, 209, 102, 0.12);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
    }

    header { margin-bottom: 40px; text-align: center; }

    .logo-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 12px var(--accent-glow);
      vertical-align: middle;
      position: relative; top: -1px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      display: inline;
    }

    .tagline {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 10px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }

    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .status-indicator.recording {
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status-indicator.paused {
      background: var(--yellow);
      box-shadow: 0 0 10px var(--yellow);
    }
    .status-indicator.ready {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { color: var(--text-muted); flex: 1; min-width: 0; }
    .status-text span { color: var(--text); font-weight: 600; }
    .timer { color: var(--text-muted); margin-left: auto; white-space: nowrap; }
    .timer.active { color: var(--red); }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .lang-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s ease;
      flex: 1;
      justify-content: center;
      min-width: 100px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .btn svg { width: 17px; height: 17px; flex-shrink: 0; }

    .btn-start { background: var(--accent); color: #0d0f12; border-color: var(--accent); }
    .btn-start:active:not(:disabled) { filter: brightness(1.15); }

    .btn-pause { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow); }
    .btn-pause:active:not(:disabled) { background: rgba(255,209,102,0.25); }

    .btn-stop { background: var(--red-dim); color: var(--red); border-color: var(--red); }
    .btn-stop:active:not(:disabled) { background: rgba(255,77,109,0.25); }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .visualizer {
      height: 44px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .visualizer.active { opacity: 1; }
    .bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      height: 6px;
      transition: height 0.08s ease;
    }

    .transcript-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .transcript-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .word-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .transcript-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 260px;
      max-height: 460px;
      overflow-y: auto;
      padding: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--text);
      transition: border-color 0.3s;
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }
    .transcript-box.recording-active { border-color: rgba(0,229,160,0.3); }
    .transcript-box::-webkit-scrollbar { width: 5px; }
    .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .interim-text { color: var(--text-muted); font-style: italic; }
    .placeholder { color: var(--text-muted); font-style: italic; user-select: none; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .action-btn svg { width: 14px; height: 14px; }
    .action-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .action-btn.danger:active { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 22px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .not-supported {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .not-supported strong { color: var(--red); display: block; font-size: 1.1rem; margin-bottom: 10px; }

    @media (max-width: 480px) {
      body { padding: 24px 14px 50px; }
      .card { padding: 18px; }
      .btn { font-size: 0.88rem; padding: 13px 14px; min-width: 80px; }
      header { margin-bottom: 28px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div style="margin-bottom:6px">
      <span class="logo-dot"></span>
      <h1>VoiceScribe</h1>
    </div>
    <p class="tagline">// real-time speech → text · en · hi · hinglish</p>
  </header>

  <div class="card" id="main-card">

    <div class="status-bar">
      <div class="status-indicator" id="statusDot"></div>
      <div class="status-text" id="statusText"><span>Ready</span> — tap Start to begin</div>
      <div class="timer" id="timer">00:00:00</div>
    </div>

    <div class="lang-row">
      <span class="lang-label">Lang:</span>
      <button class="lang-btn active" data-lang="en-IN" onclick="setLang(this)">English</button>
      <button class="lang-btn" data-lang="hi-IN" onclick="setLang(this)">हिन्दी</button>
      <button class="lang-btn" data-lang="en-IN" onclick="setLang(this)">Hinglish</button>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startRecording()">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        Start
      </button>
      <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
        Pause
      </button>
      <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        Stop
      </button>
    </div>

    <div class="visualizer" id="visualizer"></div>

    <div class="transcript-header">
      <span class="transcript-label">Transcript</span>
      <span class="word-count" id="wordCount">0 words</span>
    </div>

    <div class="transcript-box" id="transcriptBox">
      <span class="placeholder" id="placeholder">Your transcribed text will appear here in real-time...</span>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="copyText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="action-btn" onclick="downloadText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <button class="action-btn danger" onclick="clearText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear
      </button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Feature detection ──────────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    document.getElementById('main-card').innerHTML = `
      <div class="not-supported">
        <strong>Browser Not Supported</strong>
        Please open this page in <b>Google Chrome</b> on Android or desktop.<br>
        Safari and Firefox do not support Speech Recognition.
      </div>`;
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let recognition     = null;
  let isRecording     = false;
  let isPaused        = false;
  let finalTranscript = '';
  let selectedLang    = 'en-IN';
  let timerInterval   = null;
  let elapsedSeconds  = 0;
  let restartTimeout  = null;

  // Visualizer
  let audioCtx    = null;
  let analyser    = null;
  let mediaStream = null;
  let animFrame   = null;
  const barEls    = [];

  // ── Waveform setup ─────────────────────────────────────────────────────────
  const vizEl    = document.getElementById('visualizer');
  const NUM_BARS = 28;
  for (let i = 0; i < NUM_BARS; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    vizEl.appendChild(b);
    barEls.push(b);
  }

  // ── Language ───────────────────────────────────────────────────────────────
  function setLang(btn) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLang = btn.dataset.lang;
  }

  // ── Timer ──────────────────────────────────────────────────────────────────
  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      elapsedSeconds++;
      const h = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(elapsedSeconds % 60).padStart(2, '0');
      const el = document.getElementById('timer');
      el.textContent = `${h}:${m}:${s}`;
      el.className = 'timer active';
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timer').className = 'timer';
  }

  function resetTimer() {
    stopTimer();
    elapsedSeconds = 0;
    document.getElementById('timer').textContent = '00:00:00';
  }

  // ── Visualizer (non-blocking, fully optional) ──────────────────────────────
  function startVisualizer() {
    // Does NOT use await — never blocks the recording flow
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        mediaStream = stream;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        vizEl.classList.add('active');
        drawBars();
      })
      .catch(() => {}); // visualizer is decorative — silently skip on failure
  }

  function drawBars() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const step = Math.max(1, Math.floor(data.length / NUM_BARS));
    barEls.forEach((bar, i) => {
      const val = data[i * step] || 0;
      bar.style.height = Math.max(4, (val / 255) * 38) + 'px';
      bar.style.opacity = isPaused ? '0.3' : '1';
    });
    animFrame = requestAnimationFrame(drawBars);
  }

  function stopVisualizer() {
    cancelAnimationFrame(animFrame);
    animFrame = null;
    vizEl.classList.remove('active');
    barEls.forEach(b => { b.style.height = '6px'; });
    try { if (audioCtx) audioCtx.close(); } catch(e) {}
    audioCtx = null; analyser = null;
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
  }

  // ── Build recognition instance ─────────────────────────────────────────────
  //
  // ROOT CAUSE OF MOBILE BUG — two issues fixed here:
  //
  // 1. Mobile Chrome ignores `continuous: true` and stops after every utterance,
  //    firing `onend`. The old code called `rec.start()` on the SAME instance
  //    which fails silently on mobile. Fix: always create a FRESH instance on restart.
  //
  // 2. The old `startRecording()` used `await startVisualizer()` which could
  //    block or delay the recognition `.start()` call. Fix: visualizer is now
  //    fire-and-forget (no await).
  //
  function buildRecognition() {
    const rec = new SR();
    rec.lang            = selectedLang;
    rec.continuous      = true;   // honoured on desktop; mobile handles via onend restart
    rec.interimResults  = true;   // desktop shows interim; mobile may only fire finals — both work
    rec.maxAlternatives = 1;

    rec.onstart = () => {
      if (isRecording && !isPaused) {
        setStatus('recording', '🔴 <span>Recording</span> — speak now');
      }
    };

    rec.onresult = (event) => {
      if (!isRecording || isPaused) return;

      let interimText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const r = event.results[i];
        if (r.isFinal) {
          const t = r[0].transcript.trim();
          if (t) finalTranscript += t + ' ';
        } else {
          interimText += r[0].transcript;
        }
      }
      renderTranscript(interimText);
    };

    rec.onerror = (e) => {
      // no-speech  → normal silence gap, onend will restart
      // aborted    → we called stop() intentionally
      // network    → transient; retry after short delay
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      if (e.error === 'network' && isRecording && !isPaused) {
        scheduleRestart(500);
      }
    };

    // CRITICAL: onend fires after EVERY utterance on mobile Chrome.
    // We must create a NEW instance and call start() — reusing fails silently.
    rec.onend = () => {
      if (isRecording && !isPaused) {
        scheduleRestart(120);
      }
    };

    return rec;
  }

  // Debounced restart — prevents double-start race on rapid onend firing
  function scheduleRestart(delay) {
    clearTimeout(restartTimeout);
    restartTimeout = setTimeout(() => {
      if (!isRecording || isPaused) return;
      recognition = buildRecognition(); // fresh instance every time
      try { recognition.start(); } catch(e) {}
    }, delay);
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderTranscript(interim) {
    const box = document.getElementById('transcriptBox');
    const ph  = document.getElementById('placeholder');
    if (ph) ph.remove();

    box.innerHTML =
      '<span>' + escHtml(finalTranscript) + '</span>' +
      (interim ? '<span class="interim-text">' + escHtml(interim) + '</span>' : '');

    box.scrollTop = box.scrollHeight;
    updateWordCount();
  }

  function escHtml(s) {
    return s
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/\n/g, '<br>');
  }

  function updateWordCount() {
    const w = finalTranscript.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = w + (w === 1 ? ' word' : ' words');
  }

  // ── UI helpers ─────────────────────────────────────────────────────────────
  function setStatus(state, html) {
    document.getElementById('statusDot').className   = 'status-indicator ' + state;
    document.getElementById('statusText').innerHTML  = html;
  }

  function setButtons(recording, paused) {
    document.getElementById('btnStart').disabled = recording;
    document.getElementById('btnPause').disabled = !recording;
    document.getElementById('btnStop').disabled  = !recording;

    document.getElementById('btnPause').innerHTML = paused
      ? '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Resume'
      : '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Pause';

    document.getElementById('transcriptBox')
      .classList.toggle('recording-active', recording && !paused);
  }

  // ── Controls ───────────────────────────────────────────────────────────────
  function startRecording() {
    if (!SR || isRecording) return;

    finalTranscript = '';
    renderTranscript('');
    resetTimer();
    isRecording = true;
    isPaused    = false;

    recognition = buildRecognition();
    try {
      recognition.start();
    } catch(e) {
      isRecording = false;
      showToast('Could not start mic. Check browser permissions.');
      return;
    }

    setButtons(true, false);
    startTimer();
    startVisualizer(); // non-blocking — no await
  }

  function togglePause() {
    if (!isRecording) return;
    isPaused = !isPaused;

    if (isPaused) {
      clearTimeout(restartTimeout);
      try { recognition.stop(); } catch(e) {}
      stopTimer();
      setStatus('paused', '⏸ <span>Paused</span> — tap Resume to continue');
      setButtons(true, true);
    } else {
      // Resume with a fresh instance
      recognition = buildRecognition();
      try { recognition.start(); } catch(e) {}
      startTimer();
      setStatus('recording', '🔴 <span>Recording</span> — speak now');
      setButtons(true, false);
    }
  }

  function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    isPaused    = false;

    clearTimeout(restartTimeout);
    try { recognition.stop(); } catch(e) {}
    recognition = null;

    stopTimer();
    stopVisualizer();
    renderTranscript('');
    setStatus('ready', '<span>Done</span> — transcript ready');
    setButtons(false, false);
    showToast('Recording stopped ✓');
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function copyText() {
    const text = finalTranscript.trim();
    if (!text) { showToast('Nothing to copy yet'); return; }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text)
        .then(() => showToast('Copied ✓'))
        .catch(()  => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    // Works on mobile where clipboard API may need a direct user-gesture context
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      showToast('Copied ✓');
    } catch(e) {
      showToast('Long-press the text to copy manually');
    }
    document.body.removeChild(ta);
  }

  function downloadText() {
    const text = finalTranscript.trim();
    if (!text) { showToast('Nothing to download yet'); return; }
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'transcript-' + new Date().toISOString().slice(0, 10) + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Downloaded ✓');
  }

  function clearText() {
    if (!confirm('Clear all transcribed text?')) return;
    finalTranscript = '';
    document.getElementById('transcriptBox').innerHTML =
      '<span class="placeholder" id="placeholder">Your transcribed text will appear here in real-time...</span>';
    updateWordCount();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 2500);
  }

  updateWordCount();
</script>
</body>
</html>
