<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Class Transcriber</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --surface2: #1e2029;
      --border: #2a2d3a;
      --accent: #f0a500;
      --accent2: #e05c2a;
      --text: #e8e9f0;
      --muted: #6b6f82;
      --danger: #e05c2a;
      --green: #3ecf8e;
      --red: #e05c2a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* Subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    /* Header */
    header {
      margin-bottom: 40px;
      text-align: center;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .logo-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Recorder card */
    .recorder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
    }

    /* Waveform visualizer */
    .visualizer-wrap {
      height: 64px;
      background: var(--surface2);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 28px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas#waveform {
      width: 100%;
      height: 100%;
      display: block;
    }

    .visualizer-idle {
      position: absolute;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    /* Timer */
    .timer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .timer {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      transition: color 0.3s;
    }

    .timer.recording { color: var(--accent); }

    .status-badge {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.3s;
    }

    .status-badge.idle    { border-color: var(--border); color: var(--muted); }
    .status-badge.rec     { border-color: var(--accent); color: var(--accent); }
    .status-badge.paused  { border-color: #a0a0c0; color: #a0a0c0; }
    .status-badge.transcribing { border-color: var(--green); color: var(--green); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-dot.blink { animation: pulse 1.2s infinite; }

    /* Chunk progress */
    .chunk-bar-wrap {
      margin-bottom: 24px;
    }

    .chunk-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 7px;
      display: flex;
      justify-content: space-between;
    }

    .chunk-bar-bg {
      height: 4px;
      border-radius: 99px;
      background: var(--surface2);
      overflow: hidden;
    }

    .chunk-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.4s linear;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 14px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.18s;
      background: var(--surface2);
      color: var(--muted);
    }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: #0e0f14;
      flex: 2;
    }
    .btn-start:not(:disabled):hover { filter: brightness(1.12); transform: translateY(-1px); }

    .btn-pause:not(:disabled):hover  { border-color: #a0a0c0; color: #e0e0f0; }
    .btn-stop:not(:disabled):hover   { border-color: var(--red); color: var(--red); }

    /* Transcript area */
    .transcript-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .transcript-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }

    .transcript-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .transcript-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.18s;
      letter-spacing: 0.04em;
    }

    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .icon-btn.copied { border-color: var(--green); color: var(--green); }

    #transcript {
      width: 100%;
      min-height: 320px;
      max-height: 420px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      padding: 24px;
      resize: vertical;
      overflow-y: auto;
    }

    #transcript::placeholder { color: var(--muted); }

    /* Transcribing indicator */
    .processing-row {
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--green);
      display: none;
      align-items: center;
      gap: 8px;
    }

    .processing-row.show { display: flex; }

    .spin {
      width: 12px; height: 12px;
      border: 2px solid var(--green);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container { animation: fadeIn 0.5s ease; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-badge">
      <span class="logo-dot"></span>
      Powered by Puter.js · Whisper
    </div>
    <h1>Class <span>Transcriber</span></h1>
    <p class="subtitle">Hindi · English · Hinglish &nbsp;—&nbsp; Up to 3 hours per session</p>
  </header>

  <!-- Recorder -->
  <div class="recorder-card">
    <div class="visualizer-wrap">
      <canvas id="waveform"></canvas>
      <span class="visualizer-idle" id="idleLabel">Microphone idle</span>
    </div>

    <div class="timer-row">
      <div class="timer" id="timer">00:00:00</div>
      <div class="status-badge idle" id="statusBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Idle</span>
      </div>
    </div>

    <div class="chunk-bar-wrap">
      <div class="chunk-label">
        <span>Chunk progress (1 min → transcribe)</span>
        <span id="chunkLabel">0s / 60s</span>
      </div>
      <div class="chunk-bar-bg">
        <div class="chunk-bar-fill" id="chunkBar"></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="btnStart">
        ▶ Start
      </button>
      <button class="btn btn-pause" id="btnPause" disabled>
        ⏸ Pause
      </button>
      <button class="btn btn-stop" id="btnStop" disabled>
        ⏹ Stop
      </button>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript-card">
    <div class="transcript-header">
      <span class="transcript-title">Transcript</span>
      <div class="transcript-actions">
        <button class="icon-btn" id="btnClear">✕ Clear</button>
        <button class="icon-btn" id="btnCopy">⎘ Copy</button>
      </div>
    </div>
    <textarea id="transcript" placeholder="Transcript will appear here as you record...&#10;&#10;Recording in 1-minute chunks. Each chunk is automatically sent for transcription once complete."></textarea>
    <div class="processing-row" id="processingRow">
      <span class="spin"></span>
      Transcribing last chunk...
    </div>
  </div>

  <footer>
    All processing happens in your browser via Puter.js · No data stored
  </footer>

</div>

<script>
  // ── DOM refs ──────────────────────────────────────────────────────────────
  const btnStart   = document.getElementById('btnStart');
  const btnPause   = document.getElementById('btnPause');
  const btnStop    = document.getElementById('btnStop');
  const btnCopy    = document.getElementById('btnCopy');
  const btnClear   = document.getElementById('btnClear');
  const timerEl    = document.getElementById('timer');
  const statusBadge= document.getElementById('statusBadge');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const chunkBar   = document.getElementById('chunkBar');
  const chunkLabel = document.getElementById('chunkLabel');
  const transcript = document.getElementById('transcript');
  const processingRow = document.getElementById('processingRow');
  const idleLabel  = document.getElementById('idleLabel');
  const canvas     = document.getElementById('waveform');
  const ctx2d      = canvas.getContext('2d');

  // ── State ─────────────────────────────────────────────────────────────────
  const CHUNK_DURATION_MS = 60_000; // 1 minute
  let state = 'idle'; // idle | recording | paused | stopped
  let mediaRecorder = null;
  let audioStream   = null;
  let audioCtx      = null;
  let analyser      = null;
  let animFrameId   = null;
  let chunks        = [];       // audio blobs for current chunk
  let totalSeconds  = 0;
  let chunkSeconds  = 0;
  let timerInterval = null;
  let chunkInterval = null;
  let pendingChunks = 0;        // transcription requests in-flight

  // ── Waveform ──────────────────────────────────────────────────────────────
  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
    ctx2d.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawIdle() {
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx2d.clearRect(0, 0, W, H);
    ctx2d.strokeStyle = '#2a2d3a';
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    ctx2d.moveTo(0, H/2);
    ctx2d.lineTo(W, H/2);
    ctx2d.stroke();
  }
  drawIdle();

  function drawWave() {
    if (!analyser) return;
    animFrameId = requestAnimationFrame(drawWave);
    const bufLen = analyser.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(dataArr);

    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx2d.clearRect(0, 0, W, H);

    // gradient line
    const grad = ctx2d.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0,   '#f0a500');
    grad.addColorStop(0.5, '#e05c2a');
    grad.addColorStop(1,   '#f0a500');

    ctx2d.lineWidth = 2;
    ctx2d.strokeStyle = state === 'paused' ? '#6b6f82' : grad;
    ctx2d.beginPath();
    const sliceW = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128.0;
      const y = (v * H) / 2;
      i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
      x += sliceW;
    }
    ctx2d.stroke();
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  function fmtTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    return [h, m, ss].map(n => String(n).padStart(2, '0')).join(':');
  }

  function startTimers() {
    timerInterval = setInterval(() => {
      totalSeconds++;
      chunkSeconds++;
      timerEl.textContent = fmtTime(totalSeconds);
      const pct = (chunkSeconds / 60) * 100;
      chunkBar.style.width = pct + '%';
      chunkLabel.textContent = `${chunkSeconds}s / 60s`;
    }, 1000);
  }

  function stopTimers() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // ── Status UI ─────────────────────────────────────────────────────────────
  function setStatus(s) {
    statusBadge.className = 'status-badge';
    statusDot.className = 'status-dot';
    if (s === 'recording') {
      statusBadge.classList.add('rec');
      statusDot.classList.add('blink');
      statusText.textContent = 'Recording';
      timerEl.classList.add('recording');
    } else if (s === 'paused') {
      statusBadge.classList.add('paused');
      statusText.textContent = 'Paused';
      timerEl.classList.remove('recording');
    } else if (s === 'transcribing') {
      statusBadge.classList.add('transcribing');
      statusDot.classList.add('blink');
      statusText.textContent = 'Transcribing';
    } else {
      statusBadge.classList.add('idle');
      statusText.textContent = 'Idle';
      timerEl.classList.remove('recording');
    }
  }

  // ── Transcription ─────────────────────────────────────────────────────────
  async function transcribeBlob(blob) {
    if (blob.size < 1000) return; // skip silence
    pendingChunks++;
    processingRow.classList.add('show');
    setStatus('transcribing');

    try {
      const result = await puter.ai.speech2txt({
        file: blob,
        model: 'whisper-1',
        language: 'hi',   // Hints Whisper toward Hindi/Hinglish; still transcribes English correctly
        prompt: 'This is a class lecture in Hindi, English, or a mix of both (Hinglish). Preserve the original language as spoken.',
      });
      const text = (result && (result.text || result)) || '';
      if (text && text.trim()) {
        const current = transcript.value;
        transcript.value = current
          ? current + '\n\n' + text.trim()
          : text.trim();
        transcript.scrollTop = transcript.scrollHeight;
      }
    } catch (err) {
      console.error('Transcription error:', err);
      const errMsg = `[Transcription error: ${err.message || err}]`;
      transcript.value += (transcript.value ? '\n\n' : '') + errMsg;
    } finally {
      pendingChunks--;
      if (pendingChunks === 0) {
        processingRow.classList.remove('show');
        if (state === 'recording') setStatus('recording');
        else if (state === 'paused') setStatus('paused');
        else setStatus('idle');
      }
    }
  }

  function flushChunk() {
    if (chunks.length === 0) return;
    const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    chunks = [];
    chunkSeconds = 0;
    chunkBar.style.width = '0%';
    chunkLabel.textContent = '0s / 60s';
    transcribeBlob(blob);
  }

  // ── Recording controls ────────────────────────────────────────────────────
  async function startRecording() {
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      alert('Microphone access denied. Please allow microphone access and try again.');
      return;
    }

    // Audio analyser for waveform
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(audioStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);

    // MediaRecorder
    mediaRecorder = new MediaRecorder(audioStream);
    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    // Start collecting data every second
    mediaRecorder.start(1000);

    // Chunk interval: every 60s, flush
    chunkInterval = setInterval(flushChunk, CHUNK_DURATION_MS);

    state = 'recording';
    setStatus('recording');
    idleLabel.style.display = 'none';
    startTimers();
    drawWave();

    btnStart.disabled = true;
    btnPause.disabled = false;
    btnStop.disabled  = false;
  }

  function pauseRecording() {
    if (state !== 'recording') return;
    mediaRecorder.pause();
    stopTimers();
    cancelAnimationFrame(animFrameId);
    animFrameId = null;
    state = 'paused';
    setStatus('paused');
    btnPause.textContent = '▶ Resume';
  }

  function resumeRecording() {
    if (state !== 'paused') return;
    mediaRecorder.resume();
    startTimers();
    drawWave();
    state = 'recording';
    setStatus('recording');
    btnPause.textContent = '⏸ Pause';
  }

  async function stopRecording() {
    if (state === 'idle') return;

    clearInterval(chunkInterval);
    chunkInterval = null;
    stopTimers();
    cancelAnimationFrame(animFrameId);
    animFrameId = null;

    // Flush remaining audio
    mediaRecorder.stop();

    // Wait a tick for final ondataavailable
    await new Promise(r => setTimeout(r, 300));
    flushChunk();

    audioStream.getTracks().forEach(t => t.stop());
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    analyser = null;

    state = 'stopped';
    setStatus('idle');
    drawIdle();
    idleLabel.style.display = '';

    chunkBar.style.width = '0%';
    chunkLabel.textContent = '0s / 60s';

    btnStart.disabled = false;
    btnPause.disabled = true;
    btnStop.disabled  = true;
    btnPause.textContent = '⏸ Pause';
  }

  // ── Button events ─────────────────────────────────────────────────────────
  btnStart.addEventListener('click', () => {
    totalSeconds = 0;
    chunkSeconds = 0;
    timerEl.textContent = '00:00:00';
    startRecording();
  });

  btnPause.addEventListener('click', () => {
    if (state === 'recording') pauseRecording();
    else if (state === 'paused') resumeRecording();
  });

  btnStop.addEventListener('click', stopRecording);

  btnCopy.addEventListener('click', async () => {
    const text = transcript.value;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      btnCopy.textContent = '✓ Copied!';
      btnCopy.classList.add('copied');
      setTimeout(() => {
        btnCopy.textContent = '⎘ Copy';
        btnCopy.classList.remove('copied');
      }, 2000);
    } catch (e) {
      // Fallback
      transcript.select();
      document.execCommand('copy');
      btnCopy.textContent = '✓ Copied!';
      setTimeout(() => { btnCopy.textContent = '⎘ Copy'; }, 2000);
    }
  });

  btnClear.addEventListener('click', () => {
    if (transcript.value && confirm('Clear the transcript? This cannot be undone.')) {
      transcript.value = '';
    }
  });
</script>
</body>
</html>
