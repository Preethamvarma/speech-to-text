<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speech to Text</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a20;
      --border: #252b35;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --accent-glow: rgba(0, 229, 160, 0.35);
      --text: #e8ecf0;
      --text-muted: #6b7585;
      --red: #ff4d6d;
      --red-dim: rgba(255, 77, 109, 0.12);
      --yellow: #ffd166;
      --yellow-dim: rgba(255, 209, 102, 0.12);
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* Subtle background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 820px;
    }

    /* Header */
    header {
      margin-bottom: 40px;
      text-align: center;
    }

    .logo-dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 12px var(--accent-glow);
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      display: inline;
    }

    .tagline {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }

    /* Main card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 10px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }

    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .status-indicator.recording {
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .status-indicator.paused {
      background: var(--yellow);
      box-shadow: 0 0 10px var(--yellow);
    }
    .status-indicator.ready {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { color: var(--text-muted); flex: 1; }
    .status-text span { color: var(--text); font-weight: 600; }

    .timer {
      color: var(--text-muted);
      margin-left: auto;
    }
    .timer.active { color: var(--red); }

    /* Language selector */
    .lang-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .lang-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--text); }
    .lang-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
      flex: 1;
      justify-content: center;
      min-width: 120px;
    }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .btn-start {
      background: var(--accent);
      color: #0d0f12;
      border-color: var(--accent);
    }
    .btn-start:hover:not(:disabled) {
      background: #00ffb3;
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-pause {
      background: var(--yellow-dim);
      color: var(--yellow);
      border-color: var(--yellow);
    }
    .btn-pause:hover:not(:disabled) {
      background: rgba(255,209,102,0.2);
      box-shadow: 0 0 16px rgba(255,209,102,0.3);
      transform: translateY(-1px);
    }

    .btn-stop {
      background: var(--red-dim);
      color: var(--red);
      border-color: var(--red);
    }
    .btn-stop:hover:not(:disabled) {
      background: rgba(255,77,109,0.2);
      box-shadow: 0 0 16px rgba(255,77,109,0.3);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Waveform visualizer */
    .visualizer {
      height: 50px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .visualizer.active { opacity: 1; }

    .bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      height: 6px;
      transition: height 0.1s ease;
    }

    /* Transcript area */
    .transcript-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .transcript-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .word-count {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .transcript-box {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 280px;
      max-height: 480px;
      overflow-y: auto;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text);
      transition: border-color 0.3s;
      scroll-behavior: smooth;
    }
    .transcript-box.recording-active { border-color: rgba(0,229,160,0.3); }

    .transcript-box::-webkit-scrollbar { width: 6px; }
    .transcript-box::-webkit-scrollbar-track { background: transparent; }
    .transcript-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .interim-text { color: var(--text-muted); font-style: italic; }
    .final-text { color: var(--text); }

    .placeholder {
      color: var(--text-muted);
      font-style: italic;
      user-select: none;
    }

    /* Action buttons below textarea */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn svg { width: 15px; height: 15px; }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .action-btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 22px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Not supported message */
    .not-supported {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .not-supported strong { color: var(--red); display: block; font-size: 1.2rem; margin-bottom: 10px; }

    @media (max-width: 480px) {
      .card { padding: 20px; }
      .btn { font-size: 0.85rem; padding: 11px 16px; }
      .controls { gap: 10px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div style="margin-bottom:6px">
      <span class="logo-dot"></span>
      <h1>VoiceScribe</h1>
    </div>
    <p class="tagline">// real-time speech → text · en · hi · hinglish</p>
  </header>

  <div class="card" id="main-card">

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-indicator" id="statusDot"></div>
      <div class="status-text" id="statusText"><span>Ready</span> — click Start to begin</div>
      <div class="timer" id="timer">00:00:00</div>
    </div>

    <!-- Language Selector -->
    <div class="lang-row">
      <span class="lang-label">Language:</span>
      <button class="lang-btn active" data-lang="en-IN" onclick="setLang(this)">English</button>
      <button class="lang-btn" data-lang="hi-IN" onclick="setLang(this)">हिन्दी</button>
      <button class="lang-btn" data-lang="en-IN" data-hint="hinglish" onclick="setLang(this)">Hinglish</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startRecording()">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        Start
      </button>
      <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
        Pause
      </button>
      <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
        Stop
      </button>
    </div>

    <!-- Waveform Visualizer -->
    <div class="visualizer" id="visualizer">
      <!-- bars injected by JS -->
    </div>

    <!-- Transcript -->
    <div class="transcript-header">
      <span class="transcript-label">Transcript</span>
      <span class="word-count" id="wordCount">0 words</span>
    </div>

    <div class="transcript-box" id="transcriptBox">
      <span class="placeholder" id="placeholder">Your transcribed text will appear here in real-time...</span>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn" onclick="copyText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy All
      </button>
      <button class="action-btn" onclick="downloadText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download .txt
      </button>
      <button class="action-btn danger" onclick="clearText()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        Clear
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  let recognition = null;
  let isRecording = false;
  let isPaused = false;
  let finalTranscript = '';
  let selectedLang = 'en-IN';
  let timerInterval = null;
  let elapsedSeconds = 0;
  let animFrame = null;
  let audioCtx = null;
  let analyser = null;
  let mediaStream = null;
  let barEls = [];

  // ─── Browser Support Check ────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    document.getElementById('main-card').innerHTML = `
      <div class="not-supported">
        <strong>Browser Not Supported</strong>
        Speech Recognition requires Chrome or Edge on desktop.<br>
        Please open this page in Google Chrome.
      </div>`;
  }

  // ─── Waveform bars setup ──────────────────────────────────────────────────
  const vizEl = document.getElementById('visualizer');
  const NUM_BARS = 32;
  for (let i = 0; i < NUM_BARS; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    vizEl.appendChild(bar);
    barEls.push(bar);
  }

  // ─── Language selector ────────────────────────────────────────────────────
  function setLang(btn) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLang = btn.dataset.lang;
    if (recognition) recognition.lang = selectedLang;
  }

  // ─── Timer ────────────────────────────────────────────────────────────────
  function startTimer() {
    timerInterval = setInterval(() => {
      elapsedSeconds++;
      const h = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(elapsedSeconds % 60).padStart(2, '0');
      const el = document.getElementById('timer');
      el.textContent = `${h}:${m}:${s}`;
      el.className = 'timer active';
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timer').className = 'timer';
  }

  function resetTimer() {
    stopTimer();
    elapsedSeconds = 0;
    document.getElementById('timer').textContent = '00:00:00';
    document.getElementById('timer').className = 'timer';
  }

  // ─── Visualizer ───────────────────────────────────────────────────────────
  async function startVisualizer() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 128;
      const src = audioCtx.createMediaStreamSource(mediaStream);
      src.connect(analyser);
      vizEl.classList.add('active');
      drawBars();
    } catch(e) { /* visualizer is optional */ }
  }

  function drawBars() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const step = Math.floor(data.length / NUM_BARS);
    barEls.forEach((bar, i) => {
      const val = data[i * step] || 0;
      const h = Math.max(4, (val / 255) * 44);
      bar.style.height = h + 'px';
      bar.style.opacity = isPaused ? '0.3' : '1';
    });
    animFrame = requestAnimationFrame(drawBars);
  }

  function stopVisualizer() {
    cancelAnimationFrame(animFrame);
    vizEl.classList.remove('active');
    if (audioCtx) { audioCtx.close(); audioCtx = null; analyser = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    barEls.forEach(b => { b.style.height = '6px'; });
  }

  // ─── Recognition setup ───────────────────────────────────────────────────
  function createRecognition() {
    const rec = new SpeechRecognition();
    rec.lang = selectedLang;
    rec.continuous = true;
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onstart = () => {
      setStatus('recording', '🔴 <span>Recording</span> — speak now');
    };

    rec.onresult = (event) => {
      if (isPaused) return;
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const res = event.results[i];
        if (res.isFinal) {
          finalTranscript += res[0].transcript + ' ';
        } else {
          interim += res[0].transcript;
        }
      }
      renderTranscript(interim);
    };

    rec.onerror = (e) => {
      if (e.error === 'no-speech') return; // auto-recovers
      if (e.error === 'aborted') return;
      console.warn('Speech error:', e.error);
    };

    rec.onend = () => {
      // Auto-restart for long sessions (browser stops after ~60s silence)
      if (isRecording && !isPaused) {
        try { rec.start(); } catch(e) {}
      }
    };

    return rec;
  }

  // ─── Render transcript ───────────────────────────────────────────────────
  function renderTranscript(interim) {
    const box = document.getElementById('transcriptBox');
    const ph = document.getElementById('placeholder');
    if (ph) ph.remove();

    box.innerHTML =
      `<span class="final-text">${escHtml(finalTranscript)}</span>` +
      (interim ? `<span class="interim-text">${escHtml(interim)}</span>` : '');

    // Auto-scroll to bottom
    box.scrollTop = box.scrollHeight;
    updateWordCount();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateWordCount() {
    const words = finalTranscript.trim().split(/\s+/).filter(Boolean).length;
    document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
  }

  // ─── Status helpers ───────────────────────────────────────────────────────
  function setStatus(state, html) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-indicator ' + state;
    txt.innerHTML = html;
  }

  function setButtons(recording, paused) {
    document.getElementById('btnStart').disabled = recording;
    document.getElementById('btnPause').disabled = !recording;
    document.getElementById('btnStop').disabled = !recording;
    document.getElementById('btnPause').innerHTML = paused
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Resume`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> Pause`;
    document.getElementById('transcriptBox').classList.toggle('recording-active', recording && !paused);
  }

  // ─── Controls ────────────────────────────────────────────────────────────
  async function startRecording() {
    if (!SpeechRecognition) return;
    finalTranscript = '';
    renderTranscript('');
    resetTimer();

    recognition = createRecognition();
    isRecording = true;
    isPaused = false;

    try {
      recognition.start();
    } catch(e) { return; }

    setButtons(true, false);
    startTimer();
    await startVisualizer();
  }

  function togglePause() {
    if (!isRecording) return;
    isPaused = !isPaused;

    if (isPaused) {
      recognition.stop();
      stopTimer();
      setStatus('paused', '⏸ <span>Paused</span> — click Resume to continue');
      setButtons(true, true);
    } else {
      try { recognition.start(); } catch(e) {}
      startTimer();
      setStatus('recording', '🔴 <span>Recording</span> — speak now');
      setButtons(true, false);
    }
  }

  function stopRecording() {
    if (!isRecording) return;
    isRecording = false;
    isPaused = false;

    recognition.stop();
    recognition = null;
    stopTimer();
    stopVisualizer();

    renderTranscript('');
    setStatus('ready', '<span>Done</span> — transcript ready');
    setButtons(false, false);
    showToast('Recording stopped ✓');
  }

  // ─── Utilities ────────────────────────────────────────────────────────────
  function copyText() {
    const text = finalTranscript.trim();
    if (!text) { showToast('Nothing to copy yet'); return; }
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard ✓'));
  }

  function downloadText() {
    const text = finalTranscript.trim();
    if (!text) { showToast('Nothing to download yet'); return; }
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    a.download = `transcript-${now.toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Downloaded ✓');
  }

  function clearText() {
    if (!confirm('Clear all transcribed text?')) return;
    finalTranscript = '';
    const box = document.getElementById('transcriptBox');
    box.innerHTML = '<span class="placeholder" id="placeholder">Your transcribed text will appear here in real-time...</span>';
    updateWordCount();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Init word count
  updateWordCount();
</script>
</body>
</html>
